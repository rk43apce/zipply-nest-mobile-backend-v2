services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vida_rider
      POSTGRES_USER: vida
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  pgdata:
