name: Deploy Zipply API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="${{ secrets.APP_DIR }}"

            cd "$APP_DIR"

            echo "Pull latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "Prepare env..."
            if [ ! -f .env.production ]; then
              echo ".env.production not found"
              exit 1
            fi

            cp .env.production .env
            chmod 600 .env

            echo "Install dependencies..."
            npm ci

            echo "Build app..."
            npm run build

            echo "Restart PM2..."
            if pm2 describe zipply-api > /dev/null; then
              pm2 restart zipply-api --update-env
            else
              pm2 start dist/main.js --name zipply-api
            fi

            pm2 save

            echo "Deployment completed"